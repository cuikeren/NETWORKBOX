<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSSTEM 재고관리 — 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0c;
      --bg-card: #1a1a1f;
      --bg-input: #212127;
      --accent: #f47920;
      --accent-dim: rgba(244,121,32,0.08);
      --accent-hover: #ff8f3f;
      --text-primary: #e8e6e3;
      --text-secondary: #9b978f;
      --text-muted: #5a5750;
      --border: #2a2924;
      --success: #34d399;
      --danger: #ef4444;
      --warning: #fbbf24;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      height: 32px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-name {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .user-name strong {
      color: var(--accent);
      font-weight: 600;
    }

    .btn-logout {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-logout:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── Content ── */
    .content {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .welcome {
      text-align: center;
      padding: 60px 20px;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: var(--accent-dim);
      border: 1px solid rgba(244,121,32,0.15);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .welcome-icon svg { width: 32px; height: 32px; }

    .welcome h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .welcome-info {
      display: inline-block;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 32px;
      text-align: left;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 2;
    }

    .welcome-info strong {
      color: var(--accent);
    }

    @media (max-width: 480px) {
      .header { padding: 12px 16px; }
      .content { padding: 24px 16px; }
      .header-logo { height: 26px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <img src="logo.png" alt="OSSTEM" class="header-logo">
      <span class="header-title">재고관리</span>
    </div>
    <div class="header-right">
      <span class="user-name"><strong id="userName"></strong>님</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="content">
    <div class="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      </div>
      <h2>로그인 성공</h2>
      <p>재고관리 시스템에 오신 것을 환영합니다.</p>
      <div class="welcome-info">
        <div>로그인 계정: <strong id="infoName"></strong></div>
        <div>로그인 시간: <strong id="infoTime"></strong></div>
        <div>상태: <strong style="color:#34d399">정상 접속</strong></div>
      </div>
    </div>
  </div>

  <script>
    const SESSION_KEY = 'inv_session';

    // 로그인 체크
    (function checkAuth() {
      try {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY));
        if (!s || !s.pin) {
          window.location.href = 'index.html';
          return;
        }
        document.getElementById('userName').textContent = s.name;
        document.getElementById('infoName').textContent = s.name;
        document.getElementById('infoTime').textContent =
          new Date(s.loginAt).toLocaleString('ko-KR');
      } catch {
        window.location.href = 'index.html';
      }
    })();

    function logout() {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
