<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSSTEM 재고관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0c;
      --bg-side: #121215;
      --bg-card: #1a1a1f;
      --bg-input: #212127;
      --bg-hover: #26262d;
      --accent: #f47920;
      --accent-dim: rgba(244,121,32,0.08);
      --accent-glow: rgba(244,121,32,0.18);
      --accent-hover: #ff8f3f;
      --success: #34d399;
      --success-dim: rgba(52,211,153,0.10);
      --warning: #fbbf24;
      --warning-dim: rgba(251,191,36,0.10);
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.10);
      --text-primary: #e8e6e3;
      --text-secondary: #9b978f;
      --text-muted: #5a5750;
      --border: #2a2924;
      --border-light: #353530;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--bg-deep); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }

    /* ── Sidebar ── */
    .sidebar {
      position:fixed; left:0; top:0; width:220px; height:100vh;
      background:var(--bg-side); border-right:1px solid var(--border);
      display:flex; flex-direction:column; z-index:100; transition:transform .3s;
    }
    .side-header { padding:20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .side-header img { height:28px; }
    .side-header span { font-size:14px; font-weight:600; }
    .side-nav { padding:12px 8px; flex:1; }
    .nav-label { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; padding:8px 10px 4px; }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px;
      cursor:pointer; color:var(--text-secondary); font-size:13px; transition:all .12s; margin-bottom:2px;
    }
    .nav-item:hover { background:var(--bg-hover); color:var(--text-primary); }
    .nav-item.active { background:var(--accent-dim); color:var(--accent); font-weight:500; }
    .nav-item svg { width:18px; height:18px; flex-shrink:0; }
    .nav-item .badge { margin-left:auto; background:var(--danger); color:#fff; font-size:10px; font-weight:600; padding:1px 7px; border-radius:10px; font-family:'JetBrains Mono',monospace; }
    .side-footer { padding:12px 16px; border-top:1px solid var(--border); }
    .btn-logout {
      width:100%; padding:8px; background:transparent; border:1px solid var(--border); border-radius:8px;
      color:var(--text-secondary); font-size:12px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all .15s;
    }
    .btn-logout:hover { border-color:var(--danger); color:var(--danger); }

    /* ── Main ── */
    .main { margin-left:220px; min-height:100vh; }
    .topbar {
      position:sticky; top:0; z-index:50; padding:16px 28px;
      background:rgba(10,10,12,0.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .topbar h2 { font-size:18px; font-weight:700; }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .user-tag { font-size:12px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }
    .user-tag strong { color:var(--accent); }

    .content { padding:24px 28px; }

    /* ── Cards ── */
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
    .stat-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; transition:border-color .2s;
    }
    .stat-card:hover { border-color:var(--border-light); }
    .stat-label { font-size:11px; color:var(--text-muted); font-weight:500; margin-bottom:6px; }
    .stat-value { font-size:26px; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:-1px; }
    .stat-sub { font-size:11px; color:var(--text-muted); margin-top:4px; font-family:'JetBrains Mono',monospace; }
    .stat-sub.up { color:var(--success); }
    .stat-sub.warn { color:var(--warning); }
    .stat-sub.down { color:var(--danger); }

    /* ── Table ── */
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:20px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); }
    .card-header h3 { font-size:14px; font-weight:600; }
    .card-actions { display:flex; gap:8px; }

    table { width:100%; border-collapse:collapse; }
    thead th {
      text-align:left; padding:10px 20px; font-size:11px; font-weight:600;
      color:var(--text-muted); text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--border);
      white-space:nowrap;
    }
    tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--bg-hover); }
    tbody td { padding:12px 20px; font-size:13px; color:var(--text-secondary); white-space:nowrap; }
    .item-name { color:var(--text-primary); font-weight:500; }
    .item-code { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); margin-top:1px; }
    .mono { font-family:'JetBrains Mono',monospace; }

    .badge-status {
      display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
      font-family:'JetBrains Mono',monospace;
    }
    .badge-normal { background:var(--success-dim); color:var(--success); }
    .badge-low { background:var(--warning-dim); color:var(--warning); }
    .badge-out { background:var(--danger-dim); color:var(--danger); }
    .badge-in { background:var(--success-dim); color:var(--success); }
    .badge-outgo { background:var(--danger-dim); color:var(--danger); }

    .action-btn {
      width:30px; height:30px; border-radius:6px; border:none; background:transparent;
      color:var(--text-muted); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:all .12s;
    }
    .action-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
    .action-btn.del:hover { background:var(--danger-dim); color:var(--danger); }
    .action-btn svg { width:15px; height:15px; }

    /* ── Buttons ── */
    .btn {
      display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px;
      border:none; cursor:pointer; font-size:13px; font-weight:500; font-family:'Noto Sans KR',sans-serif; transition:all .12s;
    }
    .btn svg { width:15px; height:15px; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-hover); }
    .btn-outline { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }
    .btn-outline:hover { border-color:var(--border-light); color:var(--text-primary); background:var(--bg-hover); }
    .btn-sm { padding:5px 10px; font-size:12px; }

    .search-box {
      display:flex; align-items:center; background:var(--bg-input); border:1px solid var(--border);
      border-radius:8px; padding:0 12px; transition:border-color .2s;
    }
    .search-box:focus-within { border-color:var(--accent); }
    .search-box svg { width:15px; height:15px; color:var(--text-muted); flex-shrink:0; }
    .search-box input {
      background:transparent; border:none; outline:none; color:var(--text-primary);
      font-size:13px; font-family:'Noto Sans KR',sans-serif; padding:8px; width:180px;
    }
    .search-box input::placeholder { color:var(--text-muted); }

    .filter-chip {
      padding:5px 14px; border-radius:20px; font-size:11px; font-weight:500; cursor:pointer;
      border:1px solid var(--border); background:transparent; color:var(--text-secondary);
      font-family:'Noto Sans KR',sans-serif; transition:all .12s;
    }
    .filter-chip:hover { border-color:var(--border-light); color:var(--text-primary); }
    .filter-chip.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

    /* ── Modal ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
      backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:var(--bg-side); border:1px solid var(--border); border-radius:14px;
      width:460px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.5);
      animation:modalIn .2s ease;
    }
    @keyframes modalIn { from{opacity:0;transform:translateY(10px) scale(.97)} to{opacity:1;transform:none} }
    .modal-head { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border); }
    .modal-head h3 { font-size:15px; font-weight:600; }
    .modal-close {
      width:30px; height:30px; border-radius:8px; border:none; background:transparent;
      color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .modal-close:hover { background:var(--bg-hover); color:var(--text-primary); }
    .modal-body { padding:22px; }
    .modal-foot { display:flex; justify-content:flex-end; gap:8px; padding:14px 22px; border-top:1px solid var(--border); }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:12px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:10px 12px; background:var(--bg-input); border:1px solid var(--border);
      border-radius:8px; color:var(--text-primary); font-size:13px; font-family:'Noto Sans KR',sans-serif;
      outline:none; transition:border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { border-color:var(--accent); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ── Empty ── */
    .empty { text-align:center; padding:48px 20px; color:var(--text-muted); }
    .empty svg { width:40px; height:40px; margin-bottom:12px; opacity:.4; }
    .empty p { font-size:13px; }

    /* ── Toast ── */
    .toast-wrap { position:fixed; top:16px; right:16px; z-index:300; display:flex; flex-direction:column; gap:8px; }
    .toast {
      background:var(--bg-side); border:1px solid var(--border); border-radius:10px; padding:10px 16px;
      font-size:13px; box-shadow:0 8px 30px rgba(0,0,0,.4); display:flex; align-items:center; gap:8px;
      animation:tIn .2s ease, tOut .2s ease 2.5s forwards;
    }
    .toast.ok { border-left:3px solid var(--success); }
    .toast.err { border-left:3px solid var(--danger); }
    @keyframes tIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }
    @keyframes tOut { to{opacity:0;transform:translateY(-6px)} }

    /* ── Pages ── */
    .page { display:none; }
    .page.active { display:block; }

    /* ── Settings ── */
    .setting-section { margin-bottom:28px; }
    .setting-section h3 { font-size:14px; font-weight:600; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .cat-list { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .cat-tag {
      display:inline-flex; align-items:center; gap:6px; padding:6px 14px;
      background:var(--bg-input); border:1px solid var(--border); border-radius:20px;
      font-size:12px; color:var(--text-secondary);
    }
    .cat-tag button {
      background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; line-height:1;
    }
    .cat-tag button:hover { color:var(--danger); }

    /* ── Mobile ── */
    .menu-toggle {
      display:none; position:fixed; top:12px; left:12px; z-index:150;
      width:38px; height:38px; border-radius:10px; background:var(--bg-card); border:1px solid var(--border);
      color:var(--text-primary); cursor:pointer; align-items:center; justify-content:center;
    }
    .menu-toggle svg { width:20px; height:20px; }
    @media(max-width:768px) {
      .menu-toggle { display:flex; }
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .main { margin-left:0; }
      .topbar { padding:14px 16px 14px 56px; }
      .content { padding:16px; }
      .stats-grid { grid-template-columns:repeat(2,1fr); }
      .modal { width:calc(100% - 32px); }
    }
    @media(max-width:480px) { .stats-grid { grid-template-columns:1fr; } }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>
<body>

<button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="side-header">
    <img src="logo.png" alt="OSSTEM">
    <span>재고관리</span>
  </div>
  <nav class="side-nav">
    <div class="nav-label">메뉴</div>
    <div class="nav-item active" data-page="dashboard" onclick="go('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      대시보드
    </div>
    <div class="nav-item" data-page="inventory" onclick="go('inventory')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      재고 현황
      <span class="badge" id="badgeLow">0</span>
    </div>
    <div class="nav-item" data-page="stockin" onclick="go('stockin')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14m-7-7l7 7 7-7"/></svg>
      입고 관리
    </div>
    <div class="nav-item" data-page="stockout" onclick="go('stockout')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 19V5m-7 7l7-7 7 7"/></svg>
      출고 관리
    </div>
    <div class="nav-label" style="margin-top:16px">시스템</div>
    <div class="nav-item" data-page="settings" onclick="go('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      설정
    </div>
  </nav>
  <div class="side-footer">
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <h2 id="pageTitle">대시보드</h2>
    <div class="topbar-right">
      <span class="user-tag"><strong id="userName"></strong>님</span>
    </div>
  </div>

  <div class="content">

    <!-- ══ 1. 대시보드 ══ -->
    <div class="page active" id="pg-dashboard">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">전체 품목</div><div class="stat-value" id="sTotal">0</div><div class="stat-sub">등록된 아이템</div></div>
        <div class="stat-card"><div class="stat-label">총 재고 수량</div><div class="stat-value" id="sQty">0</div><div class="stat-sub">전체 합계</div></div>
        <div class="stat-card"><div class="stat-label">재고 부족</div><div class="stat-value" id="sLow" style="color:var(--warning)">0</div><div class="stat-sub warn">기준 이하 품목</div></div>
        <div class="stat-card"><div class="stat-label">재고 없음</div><div class="stat-value" id="sOut" style="color:var(--danger)">0</div><div class="stat-sub down">품절 품목</div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>최근 입출고</h3></div>
        <table><thead><tr><th>일시</th><th>품목</th><th>유형</th><th>수량</th><th>비고</th></tr></thead>
        <tbody id="recentTb"></tbody></table>
        <div class="empty" id="recentEmpty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><p>입출고 내역이 없습니다</p></div>
      </div>
    </div>

    <!-- ══ 2. 재고 현황 ══ -->
    <div class="page" id="pg-inventory">
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="품목명, 코드 검색..." id="invSearch" oninput="renderInv()">
        </div>
        <div class="card-actions" id="filterChips">
          <button class="filter-chip active" data-f="all" onclick="setF('all')">전체</button>
          <button class="filter-chip" data-f="normal" onclick="setF('normal')">정상</button>
          <button class="filter-chip" data-f="low" onclick="setF('low')">부족</button>
          <button class="filter-chip" data-f="out" onclick="setF('out')">품절</button>
        </div>
        <div style="margin-left:auto">
          <button class="btn btn-primary" onclick="openItemModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            품목 추가
          </button>
        </div>
      </div>
      <div class="card">
        <table><thead><tr><th>품목명</th><th>카테고리</th><th>재고</th><th>기준</th><th>상태</th><th>위치</th><th>관리</th></tr></thead>
        <tbody id="invTb"></tbody></table>
        <div class="empty" id="invEmpty" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg><p>등록된 품목이 없습니다</p></div>
      </div>
    </div>

    <!-- ══ 3. 입고 관리 ══ -->
    <div class="page" id="pg-stockin">
      <div style="margin-bottom:16px"><button class="btn btn-primary" onclick="openIOModal('in')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>입고 등록</button></div>
      <div class="card">
        <div class="card-header"><h3>입고 내역</h3></div>
        <table><thead><tr><th>일시</th><th>품목</th><th>수량</th><th>비고</th></tr></thead>
        <tbody id="inTb"></tbody></table>
        <div class="empty" id="inEmpty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14m-7-7l7 7 7-7"/></svg><p>입고 내역이 없습니다</p></div>
      </div>
    </div>

    <!-- ══ 4. 출고 관리 ══ -->
    <div class="page" id="pg-stockout">
      <div style="margin-bottom:16px"><button class="btn btn-primary" onclick="openIOModal('out')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>출고 등록</button></div>
      <div class="card">
        <div class="card-header"><h3>출고 내역</h3></div>
        <table><thead><tr><th>일시</th><th>품목</th><th>수량</th><th>비고</th></tr></thead>
        <tbody id="outTb"></tbody></table>
        <div class="empty" id="outEmpty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 19V5m-7 7l7-7 7 7"/></svg><p>출고 내역이 없습니다</p></div>
      </div>
    </div>

    <!-- ══ 5. 설정 ══ -->
    <div class="page" id="pg-settings">
      <div class="setting-section">
        <h3>카테고리 관리</h3>
        <div class="cat-list" id="catList"></div>
        <div style="display:flex;gap:8px">
          <input type="text" id="newCat" placeholder="새 카테고리명" style="flex:1;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none">
          <button class="btn btn-primary btn-sm" onclick="addCat()">추가</button>
        </div>
      </div>
      <div class="setting-section">
        <h3>데이터 관리</h3>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">모든 재고 데이터와 입출고 기록을 초기화합니다.</p>
        <button class="btn btn-outline" onclick="resetData()" style="border-color:var(--danger);color:var(--danger)">전체 데이터 초기화</button>
      </div>
    </div>

  </div>
</div>

<!-- ═══ 품목 추가/수정 Modal ═══ -->
<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <div class="modal-head"><h3 id="itemModalTitle">품목 추가</h3><button class="modal-close" onclick="closeItemModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group"><label>품목명 *</label><input type="text" id="fName" placeholder="예: TS III SA 4.0x10"></div>
      <div class="form-group"><label>품목 코드</label><input type="text" id="fCode" placeholder="예: TSIII-4010"></div>
      <div class="form-group"><label>카테고리</label><select id="fCat"></select></div>
      <div class="form-row">
        <div class="form-group"><label>현재 수량 *</label><input type="number" id="fQty" min="0" placeholder="0"></div>
        <div class="form-group"><label>기준 수량</label><input type="number" id="fMin" min="0" placeholder="10"></div>
      </div>
      <div class="form-group"><label>보관 위치</label><input type="text" id="fLoc" placeholder="예: 1층 창고 A-3"></div>
      <div class="form-group"><label>비고</label><textarea id="fNote" rows="2" placeholder="메모"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeItemModal()">취소</button><button class="btn btn-primary" onclick="saveItem()">저장</button></div>
  </div>
</div>

<!-- ═══ 입출고 Modal ═══ -->
<div class="modal-overlay" id="ioModal">
  <div class="modal">
    <div class="modal-head"><h3 id="ioModalTitle">입고 등록</h3><button class="modal-close" onclick="closeIOModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <input type="hidden" id="ioType">
      <div class="form-group"><label>품목 선택 *</label><select id="ioItem"></select></div>
      <div class="form-group"><label>수량 *</label><input type="number" id="ioQty" min="1" placeholder="0"></div>
      <div class="form-group"><label>비고</label><input type="text" id="ioNote" placeholder="사유 또는 메모"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeIOModal()">취소</button><button class="btn btn-primary" onclick="saveIO()">등록</button></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ═══ Storage ═══
const K = { items:'inv_items', logs:'inv_logs', cats:'inv_cats' };
const SESSION = 'inv_session';
const g = k => { try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]} };
const s = (k,v) => localStorage.setItem(k,JSON.stringify(v));
if(!localStorage.getItem(K.cats)) s(K.cats,['Implant','Abutment','Prosthetic','Instrument','소모품','기타']);

// ═══ Auth ═══
let session;
try{ session=JSON.parse(localStorage.getItem(SESSION)); if(!session||!session.pin) throw 0; }catch{ location.href='index.html'; }
document.getElementById('userName').textContent=session.name;
function logout(){ localStorage.removeItem(SESSION); location.href='index.html'; }

// ═══ Navigation ═══
let curPage='dashboard', curFilter='all';
const titles={dashboard:'대시보드',inventory:'재고 현황',stockin:'입고 관리',stockout:'출고 관리',settings:'설정'};
function go(p){
  curPage=p;
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-page]').forEach(e=>e.classList.toggle('active',e.dataset.page===p));
  document.getElementById('pg-'+p).classList.add('active');
  document.getElementById('pageTitle').textContent=titles[p]||'';
  document.getElementById('sidebar').classList.remove('open');
  if(p==='dashboard') renderDash();
  if(p==='inventory') renderInv();
  if(p==='stockin') renderLogs('in');
  if(p==='stockout') renderLogs('out');
  if(p==='settings') renderCats();
}

// ═══ Dashboard ═══
function renderDash(){
  const items=g(K.items), logs=g(K.logs);
  document.getElementById('sTotal').textContent=items.length;
  document.getElementById('sQty').textContent=items.reduce((a,i)=>a+(i.qty||0),0).toLocaleString();
  const low=items.filter(i=>i.qty>0&&i.qty<=(i.min||0)).length;
  const out=items.filter(i=>i.qty===0).length;
  document.getElementById('sLow').textContent=low;
  document.getElementById('sOut').textContent=out;
  document.getElementById('badgeLow').textContent=low+out;
  const recent=logs.slice(-8).reverse();
  const tb=document.getElementById('recentTb');
  const em=document.getElementById('recentEmpty');
  if(!recent.length){tb.innerHTML='';em.style.display='';return;}
  em.style.display='none';
  tb.innerHTML=recent.map(l=>`<tr>
    <td class="mono" style="font-size:12px">${l.date}</td>
    <td><span class="item-name">${l.itemName}</span></td>
    <td><span class="badge-status ${l.type==='in'?'badge-in':'badge-outgo'}">${l.type==='in'?'입고':'출고'}</span></td>
    <td class="mono" style="font-weight:600;color:${l.type==='in'?'var(--success)':'var(--danger)'}">${l.type==='in'?'+':'-'}${l.qty}</td>
    <td style="color:var(--text-muted)">${l.note||'-'}</td></tr>`).join('');
}

// ═══ Inventory ═══
function status(i){if(i.qty===0)return'out';if(i.qty<=(i.min||0))return'low';return'normal';}
function renderInv(){
  let items=g(K.items);
  const q=(document.getElementById('invSearch')?.value||'').toLowerCase();
  if(curFilter!=='all') items=items.filter(i=>status(i)===curFilter);
  if(q) items=items.filter(i=>i.name.toLowerCase().includes(q)||(i.code||'').toLowerCase().includes(q));
  const tb=document.getElementById('invTb'), em=document.getElementById('invEmpty');
  if(!items.length){tb.innerHTML='';em.style.display='';return;}
  em.style.display='none';
  tb.innerHTML=items.map(i=>{const st=status(i);const lb=st==='normal'?'정상':st==='low'?'부족':'품절';
  return`<tr>
    <td><div class="item-name">${i.name}</div><div class="item-code">${i.code||''}</div></td>
    <td>${i.cat||'-'}</td>
    <td class="mono" style="font-weight:600">${i.qty.toLocaleString()}</td>
    <td class="mono" style="color:var(--text-muted)">${(i.min||0).toLocaleString()}</td>
    <td><span class="badge-status badge-${st}">${lb}</span></td>
    <td style="color:var(--text-muted)">${i.loc||'-'}</td>
    <td>
      <button class="action-btn" onclick="editItem('${i.id}')" title="수정"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="action-btn del" onclick="delItem('${i.id}')" title="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
    </td></tr>`;}).join('');
}
function setF(f){curFilter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.f===f));renderInv();}

// ═══ Item CRUD ═══
function openItemModal(id){
  document.getElementById('editId').value=id||'';
  document.getElementById('itemModalTitle').textContent=id?'품목 수정':'품목 추가';
  fillCatSelect('fCat');
  if(id){const item=g(K.items).find(i=>i.id===id);if(item){document.getElementById('fName').value=item.name;document.getElementById('fCode').value=item.code||'';document.getElementById('fCat').value=item.cat||'';document.getElementById('fQty').value=item.qty;document.getElementById('fMin').value=item.min||'';document.getElementById('fLoc').value=item.loc||'';document.getElementById('fNote').value=item.note||'';}}
  else{['fName','fCode','fQty','fMin','fLoc','fNote'].forEach(id=>document.getElementById(id).value='');}
  document.getElementById('itemModal').classList.add('show');
}
function closeItemModal(){document.getElementById('itemModal').classList.remove('show');}
function saveItem(){
  const name=document.getElementById('fName').value.trim();
  const qty=parseInt(document.getElementById('fQty').value)||0;
  if(!name){toast('품목명을 입력해주세요','err');return;}
  const items=g(K.items),eid=document.getElementById('editId').value;
  const d={name,code:document.getElementById('fCode').value.trim(),cat:document.getElementById('fCat').value,qty,min:parseInt(document.getElementById('fMin').value)||0,loc:document.getElementById('fLoc').value.trim(),note:document.getElementById('fNote').value.trim(),updated:new Date().toISOString()};
  if(eid){const idx=items.findIndex(i=>i.id===eid);if(idx>=0)items[idx]={...items[idx],...d};toast('품목이 수정되었습니다','ok');}
  else{d.id='i_'+Date.now();d.created=new Date().toISOString();items.push(d);toast('품목이 추가되었습니다','ok');}
  s(K.items,items);closeItemModal();renderInv();renderDash();
}
function editItem(id){openItemModal(id);}
function delItem(id){if(!confirm('삭제하시겠습니까?'))return;s(K.items,g(K.items).filter(i=>i.id!==id));toast('삭제되었습니다','ok');renderInv();renderDash();}

// ═══ In/Out ═══
function openIOModal(type){
  document.getElementById('ioType').value=type;
  document.getElementById('ioModalTitle').textContent=type==='in'?'입고 등록':'출고 등록';
  document.getElementById('ioQty').value='';document.getElementById('ioNote').value='';
  const sel=document.getElementById('ioItem'),items=g(K.items);
  sel.innerHTML='<option value="">— 품목 선택 —</option>'+items.map(i=>`<option value="${i.id}">${i.name} (현재: ${i.qty})</option>`).join('');
  document.getElementById('ioModal').classList.add('show');
}
function closeIOModal(){document.getElementById('ioModal').classList.remove('show');}
function saveIO(){
  const type=document.getElementById('ioType').value,itemId=document.getElementById('ioItem').value,qty=parseInt(document.getElementById('ioQty').value)||0,note=document.getElementById('ioNote').value.trim();
  if(!itemId){toast('품목을 선택해주세요','err');return;}
  if(qty<=0){toast('수량을 입력해주세요','err');return;}
  const items=g(K.items),idx=items.findIndex(i=>i.id===itemId);if(idx<0)return;
  if(type==='out'&&items[idx].qty<qty){toast('재고가 부족합니다','err');return;}
  items[idx].qty+=(type==='in'?qty:-qty);items[idx].updated=new Date().toISOString();
  s(K.items,items);
  const logs=g(K.logs);logs.push({id:'l_'+Date.now(),itemId,itemName:items[idx].name,type,qty,note,date:new Date().toLocaleString('ko-KR')});
  s(K.logs,logs);
  toast(type==='in'?'입고 처리되었습니다':'출고 처리되었습니다','ok');
  closeIOModal();renderDash();renderInv();renderLogs(type);
}
function renderLogs(type){
  const logs=g(K.logs).filter(l=>l.type===type).reverse();
  const tbId=type==='in'?'inTb':'outTb',emId=type==='in'?'inEmpty':'outEmpty';
  const tb=document.getElementById(tbId),em=document.getElementById(emId);
  if(!logs.length){tb.innerHTML='';em.style.display='';return;}
  em.style.display='none';
  tb.innerHTML=logs.map(l=>`<tr>
    <td class="mono" style="font-size:12px">${l.date}</td>
    <td><span class="item-name">${l.itemName}</span></td>
    <td class="mono" style="font-weight:600;color:${type==='in'?'var(--success)':'var(--danger)'}">${type==='in'?'+':'-'}${l.qty}</td>
    <td style="color:var(--text-muted)">${l.note||'-'}</td></tr>`).join('');
}

// ═══ Settings ═══
function renderCats(){
  const cats=g(K.cats);
  document.getElementById('catList').innerHTML=cats.map((c,i)=>`<span class="cat-tag">${c}<button onclick="delCat(${i})">&times;</button></span>`).join('');
}
function addCat(){
  const v=document.getElementById('newCat').value.trim();if(!v)return;
  const cats=g(K.cats);if(cats.includes(v)){toast('이미 존재합니다','err');return;}
  cats.push(v);s(K.cats,cats);document.getElementById('newCat').value='';toast('추가되었습니다','ok');renderCats();
}
function delCat(i){const cats=g(K.cats);cats.splice(i,1);s(K.cats,cats);toast('삭제되었습니다','ok');renderCats();}
function fillCatSelect(id){const cats=g(K.cats),el=document.getElementById(id);el.innerHTML='<option value="">— 선택 —</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');}
function resetData(){if(!confirm('모든 데이터가 삭제됩니다. 계속하시겠습니까?'))return;localStorage.removeItem(K.items);localStorage.removeItem(K.logs);toast('초기화 완료','ok');renderDash();renderInv();}

// ═══ Toast ═══
function toast(m,t='ok'){const w=document.getElementById('toastWrap'),el=document.createElement('div');el.className=`toast ${t}`;
el.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">${t==='ok'?'<path d="M20 6L9 17l-5-5"/>':'<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'}</svg>${m}`;
w.appendChild(el);setTimeout(()=>el.remove(),3000);}

// ═══ Init ═══
renderDash();
</script>
</body>
</html>
