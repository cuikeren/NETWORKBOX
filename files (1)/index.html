<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSSTEM 재고관리 — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0c;
      --bg-primary: #111114;
      --bg-card: #1a1a1f;
      --bg-input: #212127;
      --accent: #f47920;
      --accent-dim: rgba(244,121,32,0.08);
      --accent-glow: rgba(244,121,32,0.25);
      --accent-hover: #ff8f3f;
      --danger: #ef4444;
      --text-primary: #e8e6e3;
      --text-secondary: #9b978f;
      --text-muted: #5a5750;
      --border: #2a2924;
      --border-focus: #f47920;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(244,121,32,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244,121,32,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: -30%;
      right: -10%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(244,121,32,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      width: 200px;
      margin: 0 auto 20px;
      display: block;
    }

    .brand-sub {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 20px 60px rgba(0,0,0,0.5);
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon-left {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 17px;
      height: 17px;
      color: var(--text-muted);
      transition: color 0.2s;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder {
      color: var(--text-muted);
      font-size: 13px;
    }

    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .input-wrap input:focus ~ .icon-left {
      color: var(--accent);
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .pw-toggle:hover { color: var(--text-secondary); }
    .pw-toggle svg { width: 17px; height: 17px; }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--danger);
    }

    .error-msg.show { display: flex; }
    .error-msg svg { width: 16px; height: 16px; flex-shrink: 0; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: var(--accent-hover); }
    .btn-login:active { transform: scale(0.985); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-login .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 16px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .default-info {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .default-info p {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .default-info .cred-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    .default-info .cred-label { color: var(--text-muted); }
    .default-info .cred-value { color: var(--accent); font-weight: 500; }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    @media (max-width: 480px) {
      .login-wrapper { padding: 16px; }
      .login-card { padding: 28px 22px; }
      .brand-logo { width: 160px; }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="brand">
      <img src="logo.png" alt="OSSTEM IMPLANT" class="brand-logo">
      <p class="brand-sub">재고관리 시스템</p>
    </div>

    <div class="login-card">
      <div class="card-title">로그인</div>

      <div class="error-msg" id="errorMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">아이디 또는 비밀번호가 올바르지 않습니다.</span>
      </div>

      <div class="form-group">
        <label for="userId">아이디</label>
        <div class="input-wrap">
          <input type="text" id="userId" placeholder="아이디를 입력하세요" autocomplete="username" autofocus>
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="userPw">비밀번호</label>
        <div class="input-wrap">
          <input type="password" id="userPw" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <button type="button" class="pw-toggle" onclick="togglePassword()" tabindex="-1">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="handleLogin()">
        <span class="btn-text">로그인</span>
        <div class="spinner"></div>
      </button>

      <div class="divider">기본 계정 안내</div>
      <div class="default-info">
        <p>초기 설정 계정입니다. 로그인 후 변경하세요.</p>
        <div class="cred-row">
          <span class="cred-label">관리자</span>
          <span class="cred-value">admin / admin1234</span>
        </div>
        <div class="cred-row">
          <span class="cred-label">사용자</span>
          <span class="cred-value">user01 / 1234</span>
        </div>
      </div>
    </div>

    <div class="login-footer">networkchoi.netlify.app &middot; v1.0</div>
  </div>

  <script>
    const ACCOUNTS_KEY = 'inv_accounts';
    const SESSION_KEY  = 'inv_session';

    function initAccounts() {
      if (!localStorage.getItem(ACCOUNTS_KEY)) {
        const defaults = [
          { id: 'admin',  pw: 'admin1234', name: '관리자',  role: 'admin' },
          { id: 'user01', pw: '1234',      name: '사용자1', role: 'user'  },
          { id: 'user02', pw: '1234',      name: '사용자2', role: 'user'  }
        ];
        localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(defaults));
      }
    }

    function getAccounts() {
      try { return JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || []; }
      catch { return []; }
    }

    function checkSession() {
      const s = localStorage.getItem(SESSION_KEY);
      if (s) {
        try {
          const u = JSON.parse(s);
          if (u && u.id) window.location.href = 'dashboard.html';
        } catch { localStorage.removeItem(SESSION_KEY); }
      }
    }

    function handleLogin() {
      const idEl = document.getElementById('userId');
      const pwEl = document.getElementById('userPw');
      const btn  = document.getElementById('btnLogin');
      const err  = document.getElementById('errorMsg');

      const uid = idEl.value.trim();
      const upw = pwEl.value;

      if (!uid) { showError('아이디를 입력해주세요.'); idEl.focus(); return; }
      if (!upw) { showError('비밀번호를 입력해주세요.'); pwEl.focus(); return; }

      btn.classList.add('loading');
      btn.disabled = true;
      err.classList.remove('show');

      setTimeout(() => {
        const found = getAccounts().find(a => a.id === uid && a.pw === upw);

        if (found) {
          localStorage.setItem(SESSION_KEY, JSON.stringify({
            id: found.id, name: found.name, role: found.role,
            loginAt: new Date().toISOString()
          }));
          window.location.href = 'dashboard.html';
        } else {
          showError('아이디 또는 비밀번호가 올바르지 않습니다.');
          pwEl.value = '';
          pwEl.focus();
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      }, 600);
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').classList.add('show');
    }

    function togglePassword() {
      const input = document.getElementById('userPw');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    initAccounts();
    checkSession();
  </script>
</body>
</html>
